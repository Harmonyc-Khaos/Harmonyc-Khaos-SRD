---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Harmonyc Khaos SRD</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <button class="toc-toggle" aria-label="Toggle table of contents">☰</button>

  <div class="page-shell">

    <aside class="toc-sidebar">
      <p class="site-title">Harmonyc Khaos</p>
      <p class="site-subtitle">System Reference Document</p>
      <nav>
        <ul>
          {% assign chapters = site.chapters | sort: "order" %}
          {% for chapter in chapters %}
          <li><a href="#{{ chapter.slug }}">{{ chapter.title }}</a></li>
          {% endfor %}
        </ul>
      </nav>
      <button class="print-btn">Print / Save as PDF</button>
    </aside>

    <div class="content-column">
      <main class="book">

        <div class="book-cover">
          <h1>Harmonyc Khaos</h1>
          <p>System Reference Document</p>
          <img src="{{ '/assets/images/hk4icon.png' | relative_url }}" alt="Harmonyc Khaos logo" style="width:658px;height:729px;" display: flex;>
        </div>

        {{ content }}

      </main>
    </div>

  </div>

  <script src="{{ '/assets/js/scrollspy.js' | relative_url }}"></script>
</body>
</html>
