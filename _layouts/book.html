---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Harmonyc Khaos SRD</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <header class="mobile-header">
    <button class="toc-toggle" aria-label="Toggle table of contents">☰</button>
    <span class="mobile-header-title">Harmonyc Khaos</span>
  </header>
  <div class="toc-backdrop"></div>

  <div class="page-shell">

    <aside class="toc-sidebar">
      <p class="site-title">Harmonyc Khaos"</p>
      <p class="site-subtitle">System Reference Document</p>
      <nav>
        <ul>
          {% assign chapters = site.chapters | sort: "order" %}
          {% for chapter in chapters %}
          <li><a href="#{{ chapter.slug }}">{{ chapter.title }}</a></li>
          {% endfor %}
        </ul>
      </nav>
      <button class="print-btn">Save as PDF</button>
    </aside>

    <div class="content-column">
      <main class="book">

        <div class="book-cover">
          <h1>Harmonyc Khaos</h1>
          <p>System Reference Document</p>
          <img src="{{ '/assets/images/hk4icon.png' | relative_url }}" alt="Harmonyc Khaos logo" style="max-width: 100%; width: 100%; max-height: 400px; object-fit: contain; margin: 24px auto 0; display: block;">
        </div>

        {{ content }}

      </main>
    </div>

  </div>

  <script src="{{ '/assets/js/scrollspy.js' | relative_url }}"></script>
</body>
</html>
