title: Harmonyc-Khaos
description: SRD for the Harmonyc Khaos Table Top Roleplaying Game
url: "https://harmonyc-khaos.github.io"
baseurl: "/Harmonyc-Khaos"

# Turns your loose chapter files into a Jekyll collection called `site.chapters`,
# which index.md loops over to build the one-page book.
collections:
  chapters:
    output: false
    sort_by: order

defaults:
  - scope:
      path: ""
      type: chapters
    values:
      layout: none

# Nothing outside _chapters, _layouts, assets, index.md, LICENSE and this file
# needs to be processed — keeps the build clean.
exclude:
  - README.md
  - SETUP.md
